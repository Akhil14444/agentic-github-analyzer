<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ page_title|default:"GitHub Analyzer" }}{% endblock %}</title>

    <!-- Google Fonts: JetBrains Mono + Sora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Pygments Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <style>
        /* ── CSS Variables ─────────────────────────────────────────── */
        :root {
            --bg-primary:    #0a0e1a;
            --bg-secondary:  #0f1629;
            --bg-card:       #141d35;
            --bg-hover:      #1a2540;
            --border:        #1e2d4a;
            --border-bright: #2a4080;
            --accent-blue:   #3b82f6;
            --accent-cyan:   #06b6d4;
            --accent-green:  #10b981;
            --accent-amber:  #f59e0b;
            --accent-red:    #ef4444;
            --accent-purple: #8b5cf6;
            --text-primary:  #e2e8f0;
            --text-secondary:#94a3b8;
            --text-muted:    #475569;
            --font-mono:     'JetBrains Mono', monospace;
            --font-sans:     'Sora', sans-serif;
            --radius:        8px;
            --radius-lg:     14px;
            --shadow:        0 4px 24px rgba(0,0,0,0.4);
            --shadow-glow:   0 0 30px rgba(59,130,246,0.15);
        }

        /* ── Reset & Base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── Background Grid ───────────────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Navigation ────────────────────────────────────────────── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent-blue);
            letter-spacing: -0.02em;
        }

        .nav-brand .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 1rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: var(--radius);
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            font-family: var(--font-mono);
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid;
        }

        .badge-blue  { color: var(--accent-blue);   border-color: rgba(59,130,246,0.3);  background: rgba(59,130,246,0.08);  }
        .badge-green { color: var(--accent-green);  border-color: rgba(16,185,129,0.3);  background: rgba(16,185,129,0.08);  }
        .badge-amber { color: var(--accent-amber);  border-color: rgba(245,158,11,0.3);  background: rgba(245,158,11,0.08);  }
        .badge-cyan  { color: var(--accent-cyan);   border-color: rgba(6,182,212,0.3);   background: rgba(6,182,212,0.08);   }
        .badge-red   { color: var(--accent-red);    border-color: rgba(239,68,68,0.3);   background: rgba(239,68,68,0.08);   }

        /* ── Main Content ──────────────────────────────────────────── */
        main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Cards ─────────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .card-sm { padding: 1.25rem; }

        /* ── Buttons ───────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #2563eb);
            color: white;
            box-shadow: 0 4px 14px rgba(59,130,246,0.35);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59,130,246,0.5);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            color: var(--text-primary);
            border-color: var(--border-bright);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* ── Alerts ────────────────────────────────────────────────── */
        .alert {
            padding: 0.9rem 1.2rem;
            border-radius: var(--radius);
            border: 1px solid;
            font-size: 0.88rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .alert-error {
            background: rgba(239,68,68,0.08);
            border-color: rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16,185,129,0.08);
            border-color: rgba(16,185,129,0.3);
            color: #6ee7b7;
        }

        /* ── Tables ────────────────────────────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
            margin: 1rem 0;
        }

        th {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 2px solid var(--border-bright);
            color: var(--accent-blue);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        tr:hover td { background: var(--bg-hover); }

        /* ── Code ───────────────────────────────────────────────────── */
        code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: rgba(59,130,246,0.1);
            color: var(--accent-cyan);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(59,130,246,0.2);
        }

        pre {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            overflow-x: auto;
            margin: 1rem 0;
        }

        pre code {
            background: none;
            border: none;
            padding: 0;
            color: #e6edf3;
            font-size: 0.85rem;
        }

        /* ── Footer ─────────────────────────────────────────────────── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        /* ── Scrollbar ──────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

        /* ── Utilities ──────────────────────────────────────────────── */
        .text-mono  { font-family: var(--font-mono); }
        .text-muted { color: var(--text-muted); }
        .text-secondary { color: var(--text-secondary); }
        .text-accent { color: var(--accent-blue); }
        .flex { display: flex; align-items: center; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .mt-1 { margin-top: 0.25rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .w-full { width: 100%; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="/" class="nav-brand">
            <div class="logo-icon">⚡</div>
            GH<span style="color:var(--accent-cyan)">Analyzer</span>
        </a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li>
                <span class="badge badge-blue">
                    <span>●</span> CrewAI
                </span>
            </li>
            <li>
                <span class="badge badge-green">
                    <span>●</span> MCP Server
                </span>
            </li>
            <li>
                <span class="badge badge-cyan">
                    <span>●</span> GPT-4o
                </span>
            </li>
        </ul>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <span>Agentic GitHub Analyzer</span> &nbsp;·&nbsp;
    <span>Built with CrewAI + Django + GitHub MCP Server</span> &nbsp;·&nbsp;
    <span>Powered by OpenAI GPT-4o</span>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
