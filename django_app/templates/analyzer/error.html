{% extends "analyzer/base.html" %}

{% block title %}Error — GitHub Analyzer{% endblock %}

{% block content %}
<div style="max-width:600px; margin:4rem auto; text-align:center; padding: 1rem;">
  <div style="font-size:3.5rem; margin-bottom:1rem;">⚠️</div>
  <h1 style="font-size:1.5rem; font-weight:700; margin-bottom:0.75rem; color:var(--accent-red)">
    Analysis Error
  </h1>
  <p style="color:var(--text-secondary); margin-bottom:2rem; line-height:1.7;">
    {{ error }}
  </p>
  {% if owner and repo %}
  <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem;">
    Repository: <code style="color:var(--accent-cyan)">{{ owner }}/{{ repo }}</code>
  </p>
  {% endif %}
  <a href="/" class="btn-primary" style="display:inline-block; text-decoration:none;">
    ← Try Another Repository
  </a>
</div>
{% endblock %}
